      .routeSolid{stroke:#1f7a5a;stroke-width:12;stroke-linecap:round;stroke-linejoin:round;fill:none;filter:url(#pencil)}
      .label{fill:#fffdf8;stroke:#d8a86f;stroke-width:2}
      .chip{fill:#dff3d5}
      .muted{fill:#687078}
    </style>
    
